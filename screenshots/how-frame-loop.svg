<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" width="920" role="img"
     aria-label="The damage-driven frame loop: every event source sets one dirty flag; the loop coalesces them into a single vsync-paced composite and present. Idle costs nothing; a lone fullscreen window bypasses the compositor.">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; }
    .t    { fill: #1d1f2b; }
    .m    { fill: #565b70; }
    .code { fill: #33385a; }
    .tag  { fill: #7c82a1; font-style: italic; }
    .box  { fill: #f5f6fb; }
  </style>
  <defs>
    <marker id="arw2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a90a6"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="908" height="418" rx="16" fill="#ffffff" stroke="#d7dae6"/>

  <text x="460" y="42" class="t" font-size="19" font-weight="700" text-anchor="middle">The damage-driven frame loop</text>
  <text x="460" y="63" class="m" font-size="12" text-anchor="middle">every source just sets one dirty flag — the loop coalesces them into a single vsync-paced repaint</text>

  <!-- event sources -->
  <rect class="box" x="28" y="88" width="250" height="150" rx="10" stroke="#2f6fed" stroke-width="1.4"/>
  <text x="44" y="112" class="t" font-size="13" font-weight="700">EVENT SOURCES</text>
  <text x="44" y="136" class="m" font-size="11">• X fd — Damage · Map · Configure</text>
  <text x="44" y="158" class="m" font-size="11">• Frame timer — animation ticks</text>
  <text x="44" y="180" class="m" font-size="11">• Control socket — ricomctl commands</text>
  <text x="44" y="202" class="m" font-size="11">• Signals — SIGHUP reload · SIGUSR1 log</text>

  <!-- dirty -->
  <rect class="box" x="322" y="138" width="118" height="52" rx="10" stroke="#c07d18" stroke-width="1.4"/>
  <text x="381" y="162" class="t mono" font-size="13" font-weight="600" text-anchor="middle">self.dirty</text>
  <text x="381" y="179" class="m" font-size="10" text-anchor="middle">= true</text>

  <!-- composite -->
  <rect class="box" x="484" y="112" width="190" height="104" rx="10" stroke="#0f9182" stroke-width="1.4"/>
  <text x="579" y="138" class="t" font-size="14" font-weight="600" text-anchor="middle">composite()</text>
  <text x="579" y="159" class="m" font-size="10.5" text-anchor="middle">walk the visible stack</text>
  <text x="579" y="177" class="m" font-size="10.5" text-anchor="middle">opacity = fade × dim</text>
  <text x="579" y="197" class="m" font-size="10" text-anchor="middle">occlusion ∩ damage → draw list</text>

  <!-- present -->
  <rect class="box" x="706" y="112" width="186" height="104" rx="10" stroke="#7a4dff" stroke-width="1.4"/>
  <text x="799" y="138" class="t" font-size="13" font-weight="600" text-anchor="middle">present_windows</text>
  <text x="799" y="159" class="m" font-size="10.5" text-anchor="middle">textured quads + effects</text>
  <text x="799" y="176" class="m" font-size="10.5" text-anchor="middle">shadow · blur · SDF HUD</text>
  <text x="799" y="197" class="code mono" font-size="10.5" text-anchor="middle">eglSwapBuffers → vsync</text>

  <!-- flow arrows -->
  <line x1="278" y1="163" x2="320" y2="163" stroke="#8a90a6" stroke-width="1.6" marker-end="url(#arw2)"/>
  <line x1="440" y1="163" x2="482" y2="164" stroke="#8a90a6" stroke-width="1.6" marker-end="url(#arw2)"/>
  <line x1="674" y1="164" x2="704" y2="164" stroke="#8a90a6" stroke-width="1.6" marker-end="url(#arw2)"/>

  <!-- loop back -->
  <path d="M799,216 L799,250 L381,250 L381,192" fill="none" stroke="#8a90a6" stroke-width="1.6" marker-end="url(#arw2)"/>
  <text x="590" y="244" class="tag" font-size="10.5" text-anchor="middle">one composite() per loop iteration · eglSwapBuffers paces it</text>

  <!-- callout: idle -->
  <rect x="28" y="286" width="420" height="118" rx="10" fill="#f1f8f4" stroke="#bfe0cd" stroke-width="1.3"/>
  <circle cx="46" cy="309" r="4" fill="#1a9b53"/>
  <text x="60" y="313" class="t" font-size="13" font-weight="700">Nearly free when idle</text>
  <text x="48" y="337" class="m" font-size="11">The frame timer arms only while something animates and</text>
  <text x="48" y="355" class="m" font-size="11">drops itself on settle — an idle screen has zero wakeups.</text>
  <text x="48" y="373" class="m" font-size="11">use-damage (EGL buffer age) repaints only the region that</text>
  <text x="48" y="391" class="m" font-size="11">changed, never the whole surface.</text>

  <!-- callout: unredir -->
  <rect x="464" y="286" width="428" height="118" rx="10" fill="#fdf3f3" stroke="#eccaca" stroke-width="1.3"/>
  <circle cx="482" cy="309" r="4" fill="#dc4c4c"/>
  <text x="496" y="313" class="t" font-size="13" font-weight="700">unredir-if-possible</text>
  <text x="484" y="337" class="m" font-size="11">A lone fullscreen window: the overlay is unmapped and</text>
  <text x="484" y="355" class="m" font-size="11">composite() becomes a no-op, so the window page-flips</text>
  <text x="484" y="373" class="m" font-size="11">straight to the display (compositor cost → 0). A corner</text>
  <text x="484" y="391" class="m" font-size="11">overlay reappears → re-redirect, and stay tear-free.</text>
</svg>
